<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Hotel Reservation Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-cream: #faf7f2;
      --navy-primary: #1a365d;
      --gold-accent: #c5a059;
      --text-dark: #2d3748;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--bg-cream);
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark);
      line-height: 1.7;
      margin: 0;
      overflow-x: hidden;
    }

    .watercolor-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 10% 20%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(91, 122, 88, 0.05) 0%, transparent 40%);
      z-index: -1;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 1s ease;
    }

    .convention-logo {
      font-family: 'Merriweather', serif;
      font-size: 1.2rem;
      color: var(--gold-accent);
      letter-spacing: 3px;
      display: block;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Merriweather', serif;
      font-size: 2.5rem;
      color: var(--navy-primary);
      margin: 0;
      line-height: 1.2;
    }

    section {
      background: var(--white);
      border-radius: 20px;
      padding: 35px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      border: 1px solid rgba(197,160,89,0.1);
      animation: fadeInUp 0.8s ease forwards;
    }

    h2 {
      font-family: 'Merriweather', serif;
      color: var(--navy-primary);
      border-bottom: 2px solid var(--bg-cream);
      padding-bottom: 15px;
      margin-top: 0;
    }

    .data-row {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px dashed #eee;
    }
    
    .data-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .text-content {
      margin-bottom: 15px;
      font-size: 1rem;
    }

    /* 시트에서 불러온 이미지를 위한 스타일 */
    .section-note {
      color: #4a5568;
      margin: -5px 0 25px;
    }

    .step-block {
      background: #fbfaf7;
      border: 1px solid rgba(197,160,89,0.18);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 22px;
    }

    .step-block h3,
    .support-card h3 {
      color: var(--navy-primary);
      margin: 0 0 16px;
      font-size: 1.25rem;
    }

    .step-item {
      padding: 16px 0;
      border-top: 1px dashed #e6dfd3;
    }

    .step-item:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .step-item p {
      margin: 0 0 12px;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .room-card {
      border: 1px solid rgba(26,54,93,0.12);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .room-card .instruction-image {
      border: none;
      border-radius: 0;
      box-shadow: none;
      margin: 0;
      width: 100%;
    }

    .room-card-body {
      padding: 16px;
    }

    .room-card h3 {
      color: var(--navy-primary);
      font-size: 1.05rem;
      margin: 0 0 8px;
    }

    .room-card p {
      margin: 0;
      color: #4a5568;
    }

    .support-card {
      background: #fbfaf7;
      border: 1px solid rgba(197,160,89,0.2);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .support-card p {
      margin: 0 0 14px;
    }

    .support-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .sms-link {
      display: block;
      padding: 16px;
      border-radius: 14px;
      background: var(--white);
      color: var(--navy-primary);
      text-decoration: none;
      border: 1px solid rgba(26,54,93,0.14);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .sms-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(26,54,93,0.08);
    }

    .sms-link strong {
      display: block;
      margin-bottom: 5px;
    }

    .highlight-red {
      color: #c53030;
      font-weight: 700;
    }

    .instruction-image {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      border: 1px solid #f0f0f0;
      display: block;
      margin: 15px auto;
    }

    .loading {
      text-align: center;
      font-size: 1.2rem;
      color: var(--gold-accent);
      padding: 50px;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      section { padding: 25px; }
      .room-grid,
      .support-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="watercolor-bg"></div>

  <div class="container">
    <header>
      <span class="convention-logo">2026 ENGLISH REGIONAL CONVENTION</span>
      <h1>ETERNAL HAPPINESS</h1>
      <p style="color: var(--navy-primary); font-weight: 500; margin-top: 15px;">Reservation Starts: May 1, 08:00 AM</p>
    </header>

    <div id="content-area">
      <div class="loading">Loading reservation guide...</div>
    </div>
  </div>

  <script>
    // ★ 여기에 앱스스크립트에서 새로 배포한 '웹앱 URL'을 붙여넣으세요 ★
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw7w5o6ptYwJMAUauX0YskpLQ1rbgV0IYPYjb2PpVpsTqrSqct6q5TgF2TFZH-WpxiN/exec';

    async function loadData() {
      try {
        const response = await fetch(APPS_SCRIPT_URL);
        const data = await response.json();
        renderUI(data);
      } catch (error) {
        document.getElementById('content-area').innerHTML = '<p style="text-align:center; color:red;">Failed to load data. Please check the connection.</p>';
        console.error('Error fetching data:', error);
      }
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatText(value) {
      return escapeHTML(value)
        .replace(/\*\*(.*?)\*\*/g, '<span class="highlight-red">$1</span>')
        .replace(/\n/g, '<br>');
    }

    function makeImage(src, altText) {
      if (!src) return null;
      const img = document.createElement('img');
      img.src = src;
      img.className = 'instruction-image';
      img.alt = altText;
      img.loading = 'lazy';
      return img;
    }

    function groupRowsBySection(data) {
      const sections = [];
      let currentSection = null;

      data.forEach((row) => {
        if (row['Title'] === 'Welcome' || !row['Data 1']) return;

        if (row['Title']) {
          currentSection = { title: row['Title'], rows: [] };
          sections.push(currentSection);
        }

        if (currentSection) currentSection.rows.push(row);
      });

      return sections;
    }

    function createSection(title) {
      const section = document.createElement('section');
      const header = document.createElement('h2');
      header.textContent = title;
      section.appendChild(header);
      return section;
    }

    function renderDefaultSection(sectionData) {
      const section = createSection(sectionData.title);

      sectionData.rows.forEach((row) => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'data-row';

        const textDiv = document.createElement('div');
        textDiv.className = 'text-content';
        textDiv.innerHTML = `<strong>${formatText(row['Data 1'])}</strong>`;
        if (row['Data 2']) textDiv.innerHTML += `<br>${formatText(row['Data 2'])}`;
        rowDiv.appendChild(textDiv);

        const img = makeImage(row['Image'], 'Guide instruction');
        if (img) rowDiv.appendChild(img);

        section.appendChild(rowDiv);
      });

      return section;
    }

    function renderReservationSteps(sectionData) {
      const section = createSection(sectionData.title);
      const note = document.createElement('p');
      note.className = 'section-note';
      note.innerHTML = 'Follow each step in order. <span class="highlight-red">Please complete email verification within 10 minutes.</span>';
      section.appendChild(note);

      const stepGroups = new Map();
      sectionData.rows.forEach((row) => {
        const stepTitle = row['Data 1'];
        if (!stepGroups.has(stepTitle)) stepGroups.set(stepTitle, []);
        stepGroups.get(stepTitle).push(row);
      });

      stepGroups.forEach((rows, stepTitle) => {
        const block = document.createElement('div');
        block.className = 'step-block';
        block.innerHTML = `<h3>${formatText(stepTitle)}</h3>`;

        rows.forEach((row) => {
          const item = document.createElement('div');
          item.className = 'step-item';
          item.innerHTML = `<p>${formatText(row['Data 2'])}</p>`;

          const img = makeImage(row['Image'], `${stepTitle} guide instruction`);
          if (img) item.appendChild(img);

          block.appendChild(item);
        });

        section.appendChild(block);
      });

      return section;
    }

    function renderRoomInformation(sectionData) {
      const section = createSection(sectionData.title);
      const note = document.createElement('p');
      note.className = 'section-note';
      note.textContent = 'Compare the available hotel room types at a glance before choosing your room.';
      section.appendChild(note);

      const grid = document.createElement('div');
      grid.className = 'room-grid';

      sectionData.rows.forEach((row) => {
        const card = document.createElement('div');
        card.className = 'room-card';

        const img = makeImage(row['Image'], `${row['Data 1']} room type`);
        if (img) card.appendChild(img);

        const body = document.createElement('div');
        body.className = 'room-card-body';
        body.innerHTML = `<h3>${formatText(row['Data 1'])}</h3><p>${formatText(row['Data 2'])}</p>`;
        card.appendChild(body);

        grid.appendChild(card);
      });

      section.appendChild(grid);
      return section;
    }

    function renderSupport(sectionData) {
      const section = createSection(sectionData.title);
      const card = document.createElement('div');
      card.className = 'support-card';
      card.innerHTML = `
        <h3>Need help with your hotel reservation?</h3>
        <p>If you have any questions about accommodations, please send us a text message. We will do our best to reply <span class="highlight-red">within 24 hours</span> whenever possible.</p>
        <p>For general hotel and accommodation questions, contact Jung Hyun Myoung. For technical issues during the reservation process, contact Lee Moonkyung.</p>
        <div class="support-actions">
          <a class="sms-link" href="sms:01035896061">
            <strong>💬 Text Jung Hyun Myoung</strong>
            Accommodation questions<br>010-3589-6061
          </a>
          <a class="sms-link" href="sms:01055241935">
            <strong>💬 Text Lee Moonkyung</strong>
            Reservation process errors<br>010-5524-1935
          </a>
        </div>
      `;
      section.appendChild(card);
      return section;
    }

    function renderStructuredUI(data, contentArea) {
      contentArea.innerHTML = '';

      groupRowsBySection(data).forEach((sectionData) => {
        if (sectionData.title === '2. Reservation Steps') {
          contentArea.appendChild(renderReservationSteps(sectionData));
        } else if (sectionData.title === '3. Important Room Information') {
          contentArea.appendChild(renderRoomInformation(sectionData));
        } else if (sectionData.title === '6. Support') {
          contentArea.appendChild(renderSupport(sectionData));
        } else {
          contentArea.appendChild(renderDefaultSection(sectionData));
        }
      });
    }

    function renderUI(data) {
      const contentArea = document.getElementById('content-area');
      renderStructuredUI(data, contentArea);
    }

    // 페이지가 로드되면 데이터 가져오기 시작
    window.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
