<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Hotel Reservation Guide</title>
  <meta name="description" content="Provided by Rooming Dept.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="2026 Hotel Reservation Guide">
  <meta property="og:title" content="2026 Hotel Reservation Guide">
  <meta property="og:description" content="Provided by Rooming Dept.">
  <meta property="og:url" content="https://2026roominginfo.pages.dev/">
  <meta property="og:image" content="https://2026roominginfo.pages.dev/2026roominginfo-logo.jpeg">
  <meta property="og:image:secure_url" content="https://2026roominginfo.pages.dev/2026roominginfo-logo.jpeg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="2048">
  <meta property="og:image:height" content="1152">
  <meta property="og:image:alt" content="Watercolor hotel reservation guide illustration">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="2026 Hotel Reservation Guide">
  <meta name="twitter:description" content="Provided by Rooming Dept.">
  <meta name="twitter:image" content="https://2026roominginfo.pages.dev/2026roominginfo-logo.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-cream: #f4f9f5;
      --sky-soft: #dcecfb;
      --sky: #9fc8e8;
      --sky-deep: #477da8;
      --spring-green: #8fb86e;
      --leaf-green: #5f7f4a;
      --navy-primary: #243b53;
      --gold-accent: #8dae62;
      --text-dark: #24313f;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #eaf5ff 0%, #f7fbef 52%, #f4f9f5 100%);
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark);
      line-height: 1.7;
      margin: 0;
      overflow-x: hidden;
    }

    .watercolor-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 15% 12%, rgba(159, 200, 232, 0.28) 0%, transparent 38%),
                  radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.7) 0%, transparent 28%),
                  radial-gradient(circle at 92% 82%, rgba(143, 184, 110, 0.22) 0%, transparent 42%),
                  radial-gradient(circle at 8% 78%, rgba(95, 127, 74, 0.12) 0%, transparent 34%);
      z-index: -1;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      padding: 24px 16px 10px;
      animation: fadeInDown 1s ease;
    }

    .convention-logo {
      font-family: 'Merriweather', serif;
      font-size: 1.2rem;
      color: var(--leaf-green);
      letter-spacing: 3px;
      display: block;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Merriweather', serif;
      font-size: 2.5rem;
      color: var(--navy-primary);
      margin: 0;
      line-height: 1.2;
    }

    .helpdesk-subtitle {
      color: var(--sky-deep);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin: 18px 0 12px;
      text-transform: uppercase;
    }

    .reservation-timeline {
      max-width: 760px;
      margin: 18px auto 0;
      padding: 18px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(248,252,255,0.8) 100%);
      border: 1px solid rgba(159,200,232,0.62);
      box-shadow: 0 16px 36px rgba(71,125,168,0.13);
    }

    .timeline-caption {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
      color: var(--navy-primary);
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .timeline-caption::before,
    .timeline-caption::after {
      content: "";
      width: 42px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(95,127,74,0.5));
    }

    .timeline-caption::after {
      background: linear-gradient(90deg, rgba(95,127,74,0.5), transparent);
    }

    .timeline-hint {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin: 0 0 16px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(232,246,255,0.78);
      border: 1px solid rgba(159,200,232,0.58);
      color: var(--sky-deep);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .timeline-hint::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--spring-green);
      box-shadow: 0 0 0 5px rgba(143,184,110,0.18);
    }

    .timeline-bar {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .timeline-bar::before {
      content: "";
      position: absolute;
      top: 31px;
      left: 8%;
      right: 8%;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #9fc8e8 0%, #8fb86e 43%, #d8c978 74%, #d56f61 100%);
      opacity: 0.45;
    }

    .timeline-segment {
      position: relative;
      border: 0;
      border-radius: 18px;
      padding: 20px 12px 14px;
      color: var(--navy-primary);
      cursor: pointer;
      text-align: center;
      font: inherit;
      box-shadow: 0 10px 22px rgba(36,59,83,0.1);
      transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
    }

    .timeline-segment:hover,
    .timeline-segment.is-active {
      filter: saturate(1.1);
      box-shadow: 0 16px 30px rgba(36,59,83,0.16);
    }

    .timeline-segment.is-active {
      transform: translateY(-4px);
      outline: 2px solid rgba(36,59,83,0.16);
      outline-offset: 3px;
    }

    .timeline-node {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      margin: -6px auto 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
      border: 4px solid currentColor;
      box-shadow: 0 4px 10px rgba(36,59,83,0.12);
    }

    .timeline-segment small,
    .timeline-segment strong,
    .timeline-segment span:not(.timeline-node) {
      display: block;
      line-height: 1.25;
    }

    .timeline-segment small {
      margin-bottom: 8px;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .timeline-segment strong {
      font-size: 0.92rem;
      min-height: 2.3em;
    }

    .timeline-note {
      margin-top: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(36,49,63,0.74);
    }

    .timeline-open {
      background: linear-gradient(180deg, #e8f6ff 0%, #cfe8f9 100%);
      color: #315f86;
    }

    .timeline-booking {
      background: linear-gradient(180deg, #eef8e8 0%, #d9edc9 100%);
      color: #476c34;
    }

    .timeline-cancel {
      background: linear-gradient(180deg, #fff6d7 0%, #ece2aa 100%);
      color: #746323;
    }

    .timeline-fee {
      background: linear-gradient(180deg, #ffe9e4 0%, #f2b5a9 100%);
      color: #7f1d1d;
    }

    .timeline-detail {
      position: relative;
      min-height: 3.5em;
      margin-top: 16px;
      padding: 14px 16px 14px 44px;
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(159,200,232,0.46);
      color: var(--text-dark);
      font-weight: 700;
      text-align: left;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.65);
    }

    .timeline-detail::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.48;
    }

    .timeline-detail.is-fee {
      border-color: rgba(213,111,97,0.36);
      color: #7f1d1d;
      background: rgba(255,247,245,0.92);
    }

    section {
      background: var(--white);
      border-radius: 18px;
      padding: 35px;
      margin-bottom: 30px;
      box-shadow: 0 14px 34px rgba(71,125,168,0.08);
      border: 1px solid rgba(159,200,232,0.45);
      animation: fadeInUp 0.8s ease forwards;
    }

    h2 {
      font-family: 'Merriweather', serif;
      color: var(--navy-primary);
      border-bottom: 2px solid rgba(159,200,232,0.35);
      padding-bottom: 15px;
      margin-top: 0;
    }

    .data-row {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px dashed #eee;
    }
    
    .data-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .text-content {
      margin-bottom: 15px;
      font-size: 1rem;
    }

    /* 시트에서 불러온 이미지를 위한 스타일 */
    .section-note {
      color: #4a5568;
      margin: -5px 0 25px;
      font-weight: 800;
    }

    .copy-instruction {
      display: block;
      font-weight: 800;
      color: var(--navy-primary);
    }

    .step-block {
      background: linear-gradient(180deg, #f8fcff 0%, #f6fbf1 100%);
      border: 1px solid rgba(143,184,110,0.28);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 22px;
    }

    .step-block h3,
    .support-card h3 {
      color: var(--navy-primary);
      margin: 0 0 16px;
      font-size: 1.25rem;
    }

    .step-item {
      padding: 16px 0;
      border-top: 1px dashed rgba(95,127,74,0.25);
    }

    .step-item:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .step-item p {
      margin: 0 0 12px;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .room-card {
      border: 1px solid rgba(26,54,93,0.12);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 20px rgba(71,125,168,0.08);
    }

    .room-card .instruction-image {
      border: none;
      border-radius: 0;
      box-shadow: none;
      margin: 0;
      width: 100%;
      height: 190px;
      max-height: 190px;
      background: #f4f9f5;
    }

    .room-card-body {
      padding: 16px;
    }

    .room-card h3 {
      color: var(--navy-primary);
      font-size: 1.05rem;
      margin: 0 0 8px;
    }

    .room-card p {
      margin: 0;
      color: #4a5568;
    }

    .support-card {
      background: linear-gradient(180deg, #f8fcff 0%, #f5fbef 100%);
      border: 1px solid rgba(143,184,110,0.28);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .support-card p {
      margin: 0 0 14px;
    }

    .support-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .sms-link {
      display: block;
      padding: 16px;
      border-radius: 14px;
      background: var(--white);
      color: var(--navy-primary);
      text-decoration: none;
      border: 1px solid rgba(71,125,168,0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .sms-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(26,54,93,0.08);
    }

    .sms-link strong {
      display: block;
      margin-bottom: 5px;
    }

    .sms-link span {
      display: block;
    }

    .sms-contact {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      color: var(--sky-deep);
      font-weight: 800;
    }

    .sms-contact-icon {
      font-size: 1.15em;
      line-height: 1;
    }

    .sms-link .sms-hint {
      display: inline-flex;
      align-items: center;
      margin-top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(232,246,255,0.78);
      border: 1px solid rgba(159,200,232,0.58);
      color: var(--sky-deep);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .highlight-red {
      color: #c53030;
      font-weight: 700;
    }

    .doc-heading {
      display: block;
      margin: 18px 0 10px;
      padding: 10px 14px;
      border-left: 5px solid var(--spring-green);
      border-radius: 10px;
      background: rgba(220,236,251,0.55);
      color: var(--navy-primary);
      font-weight: 700;
      font-size: 1.05rem;
    }

    .doc-subheading {
      display: block;
      margin: 14px 0 8px;
      color: var(--sky-deep);
      font-weight: 700;
    }

    .doc-list {
      margin: 10px 0 14px;
      padding-left: 22px;
    }

    .doc-list li {
      margin: 6px 0;
    }

    .action-chip {
      display: inline-block;
      margin: 0 2px;
      padding: 2px 9px;
      border-radius: 999px;
      background: #e7f3ff;
      border: 1px solid rgba(71,125,168,0.26);
      color: var(--sky-deep);
      font-weight: 700;
      white-space: nowrap;
    }

    .copy-link {
      cursor: pointer;
      user-select: none;
    }

    .copy-message {
      min-height: 1.5em;
      margin-top: 12px;
      color: var(--leaf-green);
      font-weight: 700;
    }

    .doc-divider {
      height: 1px;
      margin: 18px 0;
      background: linear-gradient(90deg, transparent, rgba(143,184,110,0.48), transparent);
    }

    .instruction-image {
      width: min(100%, 640px);
      max-width: 100%;
      max-height: 360px;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(71,125,168,0.12);
      border: 1px solid rgba(159,200,232,0.45);
      display: block;
      margin: 15px auto;
      pointer-events: none;
      cursor: default;
      user-select: none;
    }

    .step-item .instruction-image {
      max-height: 300px;
    }

    .loading {
      text-align: center;
      font-size: 1.2rem;
      color: var(--gold-accent);
      padding: 50px;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .helpdesk-subtitle {
        font-size: 0.85rem;
        letter-spacing: 0.04em;
      }
      .reservation-timeline {
        padding: 16px;
      }
      .timeline-bar {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin: 0;
        padding: 0 0 0 18px;
        overflow: visible;
      }
      .timeline-bar::before {
        display: block;
        top: 16px;
        bottom: 16px;
        left: 15px;
        right: auto;
        width: 3px;
        height: auto;
        background: linear-gradient(180deg, #9fc8e8 0%, #8fb86e 43%, #d8c978 74%, #d56f61 100%);
        opacity: 0.5;
      }
      .timeline-segment {
        display: grid;
        grid-template-columns: 34px 1fr;
        column-gap: 10px;
        align-items: center;
        min-width: 0;
        padding: 12px 14px 12px 8px;
        text-align: left;
        border-radius: 14px;
      }
      .timeline-segment.is-active {
        transform: translateX(3px);
      }
      .timeline-node {
        grid-row: 1 / span 3;
        width: 18px;
        height: 18px;
        margin: 0 auto;
        border-width: 4px;
      }
      .timeline-segment small,
      .timeline-segment strong,
      .timeline-segment span:not(.timeline-node) {
        line-height: 1.2;
      }
      .timeline-segment small {
        margin-bottom: 3px;
        font-size: 0.7rem;
      }
      .timeline-segment strong {
        min-height: 0;
        font-size: 0.95rem;
      }
      .timeline-note {
        margin-top: 4px;
        font-size: 0.74rem;
      }
      .timeline-detail {
        margin-top: 12px;
        padding: 12px 14px 12px 34px;
        font-size: 0.95rem;
        line-height: 1.6;
      }
      section { padding: 25px; }
      .instruction-image,
      .step-item .instruction-image {
        max-height: 260px;
      }
      .room-grid,
      .support-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="watercolor-bg"></div>

  <div class="container">
    <header>
      <span class="convention-logo">2026 ENGLISH REGIONAL CONVENTION</span>
      <h1>ETERNAL HAPPINESS</h1>
      <p class="helpdesk-subtitle">[Rooming Department]</p>
      <div id="reservation-timeline" class="reservation-timeline" aria-label="Reservation timeline">
        <div class="timeline-caption">Reservation Timeline</div>
        <p class="timeline-hint">Click each date to view details.</p>
        <div class="timeline-bar" role="tablist" aria-label="Important reservation dates">
          <button type="button" class="timeline-segment timeline-open" data-timeline-key="open" role="tab">
            <span class="timeline-node" aria-hidden="true"></span>
            <small>May 1, Friday</small>
            <strong>Reservations Open</strong>
            <span class="timeline-note">8:00 AM</span>
          </button>
          <button type="button" class="timeline-segment timeline-booking" data-timeline-key="booking" role="tab">
            <span class="timeline-node" aria-hidden="true"></span>
            <small>Until June 14, Sunday</small>
            <strong>Book or Change</strong>
            <span class="timeline-note">11:59 PM</span>
          </button>
          <button type="button" class="timeline-segment timeline-cancel" data-timeline-key="cancel" role="tab">
            <span class="timeline-node" aria-hidden="true"></span>
            <small>Until July 8, Wednesday</small>
            <strong>Free Cancellation</strong>
            <span class="timeline-note">No penalty</span>
          </button>
          <button type="button" class="timeline-segment timeline-fee" data-timeline-key="fee" role="tab">
            <span class="timeline-node" aria-hidden="true"></span>
            <small>After July 8, Wednesday</small>
            <strong>Fee Applies</strong>
            <span class="timeline-note">1 night's stay</span>
          </button>
        </div>
        <div id="timeline-detail" class="timeline-detail" aria-live="polite">
          Click a timeline date above to see what is available during each period.
        </div>
      </div>
    </header>

    <div id="content-area">
      <div class="loading">Loading reservation guide...</div>
    </div>
  </div>

  <script>
    // ★ 여기에 앱스스크립트에서 새로 배포한 '웹앱 URL'을 붙여넣으세요 ★
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw7w5o6ptYwJMAUauX0YskpLQ1rbgV0IYPYjb2PpVpsTqrSqct6q5TgF2TFZH-WpxiN/exec';

    async function loadData() {
      try {
        const response = await fetch(APPS_SCRIPT_URL);
        const data = await response.json();
        renderUI(data);
      } catch (error) {
        document.getElementById('content-area').innerHTML = '<p style="text-align:center; color:red;">Failed to load data. Please check the connection.</p>';
        console.error('Error fetching data:', error);
      }
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatInline(value) {
      return escapeHTML(value)
        .replace(/\[\[(.*?)\]\]/g, '<span class="action-chip">$1</span>')
        .replace(/\*\*(.*?)\*\*/g, '<span class="highlight-red">$1</span>');
    }

    function formatLabel(value) {
      const cleanedValue = String(value || '')
        .replace(/^\s*#{1,3}\s+/, '')
        .replace(/^\s*\*\s+/, '');
      return formatInline(cleanedValue);
    }

    function formatText(value) {
      const lines = String(value || '').split(/\r?\n/);
      const parts = [];
      let listItems = [];

      function flushList() {
        if (!listItems.length) return;
        parts.push(`<ul class="doc-list">${listItems.map((item) => `<li>${formatInline(item)}</li>`).join('')}</ul>`);
        listItems = [];
      }

      lines.forEach((line) => {
        const trimmed = line.trim();

        if (!trimmed) {
          flushList();
          parts.push('<br>');
          return;
        }

        if (trimmed === '***') {
          flushList();
          parts.push('<div class="doc-divider"></div>');
          return;
        }

        if (trimmed.startsWith('## ')) {
          flushList();
          parts.push(`<span class="doc-heading">${formatInline(trimmed.slice(3))}</span>`);
          return;
        }

        if (trimmed.startsWith('### ')) {
          flushList();
          parts.push(`<span class="doc-subheading">${formatInline(trimmed.slice(4))}</span>`);
          return;
        }

        if (trimmed.startsWith('# ')) {
          flushList();
          parts.push(`<span class="doc-subheading">${formatInline(trimmed.slice(2))}</span>`);
          return;
        }

        if (trimmed.startsWith('* ')) {
          listItems.push(trimmed.slice(2));
          return;
        }

        flushList();
        parts.push(`<span>${formatInline(trimmed)}</span>`);
      });

      flushList();
      return parts.join('<br>').replace(/<br><br><br>/g, '<br><br>');
    }

    function makeImage(src, altText) {
      if (!src) return null;
      const img = document.createElement('img');
      img.src = src;
      img.className = 'instruction-image';
      img.alt = altText;
      img.loading = 'lazy';
      return img;
    }

    function groupRowsBySection(data) {
      const sections = [];
      let currentSection = null;

      data.forEach((row) => {
        if (row['Title'] === 'Welcome' || !row['Data 1']) return;

        if (row['Title']) {
          currentSection = { title: row['Title'], rows: [] };
          sections.push(currentSection);
        }

        if (currentSection) currentSection.rows.push(row);
      });

      return sections;
    }

    function createSection(title) {
      const section = document.createElement('section');
      const header = document.createElement('h2');
      header.textContent = title;
      section.appendChild(header);
      return section;
    }

    function renderDefaultSection(sectionData) {
      const section = createSection(sectionData.title);

      sectionData.rows.forEach((row) => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'data-row';

        const textDiv = document.createElement('div');
        textDiv.className = 'text-content';
        textDiv.innerHTML = `<strong>${formatLabel(row['Data 1'])}</strong>`;
        if (row['Data 2']) textDiv.innerHTML += `<br>${formatText(row['Data 2'])}`;
        rowDiv.appendChild(textDiv);

        const img = makeImage(row['Image'], 'Guide instruction');
        if (img) rowDiv.appendChild(img);

        section.appendChild(rowDiv);
      });

      return section;
    }

    function renderReservationSteps(sectionData) {
      const section = createSection(sectionData.title);

      const stepGroups = new Map();
      sectionData.rows.forEach((row) => {
        const stepTitle = row['Data 1'];
        if (!stepGroups.has(stepTitle)) stepGroups.set(stepTitle, []);
        stepGroups.get(stepTitle).push(row);
      });

      stepGroups.forEach((rows, stepTitle) => {
        const block = document.createElement('div');
        block.className = 'step-block';
        block.innerHTML = `<h3>${formatLabel(stepTitle)}</h3>`;

        rows.forEach((row) => {
          const item = document.createElement('div');
          item.className = 'step-item';
          item.innerHTML = `<p>${formatText(row['Data 2'])}</p>`;

          const img = makeImage(row['Image'], `${stepTitle} guide instruction`);
          if (img) item.appendChild(img);

          block.appendChild(item);
        });

        section.appendChild(block);
      });

      return section;
    }

    function renderRoomInformation(sectionData) {
      const section = createSection(sectionData.title);
      const note = document.createElement('p');
      note.className = 'section-note';
      note.textContent = 'Compare the available hotel room types at a glance before choosing your room.';
      section.appendChild(note);

      const grid = document.createElement('div');
      grid.className = 'room-grid';

      sectionData.rows.forEach((row) => {
        const card = document.createElement('div');
        card.className = 'room-card';

        const img = makeImage(row['Image'], `${row['Data 1']} room type`);
        if (img) card.appendChild(img);

        const body = document.createElement('div');
        body.className = 'room-card-body';
        body.innerHTML = `<h3>${formatLabel(row['Data 1'])}</h3><p>${formatText(row['Data 2'])}</p>`;
        card.appendChild(body);

        grid.appendChild(card);
      });

      section.appendChild(grid);
      return section;
    }

    function getSupportSmsHref(label) {
      const normalizedLabel = String(label || '').toLowerCase();
      if (normalizedLabel.includes('general')) return 'sms:01035896061';
      if (normalizedLabel.includes('technical')) return 'sms:01055241935';
      return '';
    }

    function getSupportContact(label) {
      const normalizedLabel = String(label || '').toLowerCase();
      if (normalizedLabel.includes('general')) return 'Jung Hyun Myoung';
      if (normalizedLabel.includes('technical')) return 'Lee Moonkyung';
      return '';
    }

    function getSupportIcon(label) {
      const normalizedLabel = String(label || '').toLowerCase();
      if (normalizedLabel.includes('general')) return '🙋‍♂️';
      if (normalizedLabel.includes('technical')) return '👨‍💻';
      return '💬';
    }

    function getSupportDescription(text, contactName) {
      const plainText = String(text || '')
        .replace(/\*\*/g, '')
        .replace(/\s+/g, ' ')
        .trim();

      return plainText
        .replace(new RegExp(`,?\\s*please text\\s+${contactName}\\.?$`, 'i'), '')
        .replace(/\.$/, '')
        .trim();
    }

    function renderSupport(sectionData) {
      const section = createSection(sectionData.title);
      const card = document.createElement('div');
      card.className = 'support-card';

      const [introRow, ...supportRows] = sectionData.rows;
      if (introRow) {
        const intro = document.createElement('p');
        intro.innerHTML = 'For questions, use the <span class="action-chip">Inquiry</span> button on the reservation site.';
        card.appendChild(intro);
      }

      if (supportRows.length > 0) {
        const actions = document.createElement('div');
        actions.className = 'support-actions';

        supportRows.forEach((row) => {
          const smsHref = getSupportSmsHref(row['Data 1']);
          const contactName = getSupportContact(row['Data 1']);
          const contactIcon = getSupportIcon(row['Data 1']);
          const description = getSupportDescription(row['Data 2'], contactName);
          const item = document.createElement(smsHref ? 'a' : 'div');
          item.className = 'sms-link';
          if (smsHref) item.href = smsHref;
          item.innerHTML = `
            <strong>${formatLabel(row['Data 1'])}</strong>
            <span>${formatText(description)}</span>
            ${contactName ? `<span class="sms-contact"><span class="sms-contact-icon">${contactIcon}</span>${contactName}</span>` : ''}
            ${smsHref ? '<span class="sms-hint">Tap to send a text message</span>' : ''}
          `;
          actions.appendChild(item);
        });

        card.appendChild(actions);
      }

      section.appendChild(card);
      return section;
    }

    function renderReadyToBook(sectionData) {
      const section = createSection(sectionData.title);
      const rowDiv = document.createElement('div');
      rowDiv.className = 'data-row';
      rowDiv.innerHTML = `
        <div class="text-content">
          <span class="copy-instruction">Click below to copy the address. Paste it into your browser and get started!</span>
          <br><br>
          <button type="button" class="action-chip copy-link" data-copy-url="https://rl.jw.org">https://rl.jw.org</button>
          <div class="copy-message" aria-live="polite"></div>
        </div>
      `;

      const imageRow = sectionData.rows.find((row) => row['Image']);
      const img = imageRow ? makeImage(imageRow['Image'], 'Reservation site preview') : null;
      if (img) rowDiv.appendChild(img);

      section.appendChild(rowDiv);
      return section;
    }

    async function copyReservationUrl(button) {
      const url = button.dataset.copyUrl;
      const message = button.parentElement.querySelector('.copy-message');

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(url);
        } else {
          const textArea = document.createElement('textarea');
          textArea.value = url;
          textArea.style.position = 'fixed';
          textArea.style.left = '-9999px';
          document.body.appendChild(textArea);
          textArea.focus();
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
        }

        if (message) message.textContent = 'Address copied to clipboard.';
      } catch (error) {
        if (message) message.textContent = 'Please copy this address manually: https://rl.jw.org';
      }
    }

    function attachCopyLinkHandlers(root = document) {
      root.querySelectorAll('[data-copy-url]').forEach((button) => {
        button.addEventListener('click', () => copyReservationUrl(button));
      });
    }

    function isSectionTitle(sectionData, titles) {
      const normalizedTitle = String(sectionData.title || '').trim();
      return titles.includes(normalizedTitle);
    }

    function getTimelineKey(today = new Date()) {
      const reservationOpen = new Date(2026, 4, 1, 8, 0, 0);
      const bookingDeadline = new Date(2026, 5, 14, 23, 59, 59);
      const freeCancelDeadline = new Date(2026, 6, 8, 23, 59, 59);

      if (today < reservationOpen) return 'open';
      if (today <= bookingDeadline) return 'booking';
      if (today <= freeCancelDeadline) return 'cancel';
      return 'fee';
    }

    const TIMELINE_DETAILS = {
      open: 'Reservations open on May 1, Friday, at 8:00 AM.',
      booking: 'You may make or change your reservation until June 14, Sunday, at 11:59 PM.',
      cancel: 'You may cancel without a penalty until July 8, Wednesday.',
      fee: 'After July 8, Wednesday, free cancellation is no longer available. A cancellation fee equal to one night\'s stay will apply.'
    };

    function setTimelineActive(key) {
      const detailElement = document.getElementById('timeline-detail');

      document.querySelectorAll('[data-timeline-key]').forEach((button) => {
        const isActive = button.dataset.timelineKey === key;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-selected', String(isActive));
      });

      if (detailElement) {
        detailElement.textContent = TIMELINE_DETAILS[key] || TIMELINE_DETAILS.open;
        detailElement.classList.toggle('is-fee', key === 'fee');
      }
    }

    function initializeReservationTimeline(today = new Date()) {
      document.querySelectorAll('[data-timeline-key]').forEach((button) => {
        button.addEventListener('click', () => setTimelineActive(button.dataset.timelineKey));
      });

      setTimelineActive(getTimelineKey(today));
    }

    function renderStructuredUI(data, contentArea) {
      contentArea.innerHTML = '';

      groupRowsBySection(data).forEach((sectionData) => {
        if (isSectionTitle(sectionData, ['2. Reservation Steps', 'Booking Process'])) {
          contentArea.appendChild(renderReservationSteps(sectionData));
        } else if (isSectionTitle(sectionData, ['3. Important Room Information', 'Room Details', 'Hotel Room Details'])) {
          contentArea.appendChild(renderRoomInformation(sectionData));
        } else if (isSectionTitle(sectionData, ['6. Support', 'Need Help', 'Need Help & Support'])) {
          contentArea.appendChild(renderSupport(sectionData));
        } else if (isSectionTitle(sectionData, ['Ready to Book?', 'Now is your turn!'])) {
          contentArea.appendChild(renderReadyToBook(sectionData));
        } else {
          contentArea.appendChild(renderDefaultSection(sectionData));
        }
      });
    }

    function renderUI(data) {
      const contentArea = document.getElementById('content-area');
      renderStructuredUI(data, contentArea);
      attachCopyLinkHandlers(contentArea);
    }

    function initializePage() {
      initializeReservationTimeline();
      loadData();
    }

    // 페이지가 로드되면 데이터 가져오기 시작
    window.addEventListener('DOMContentLoaded', initializePage);
  </script>
</body>
</html>
