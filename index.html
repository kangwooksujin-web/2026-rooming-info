<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Hotel Reservation Guide</title>
  <meta name="description" content="This guide was prepared by the 2026 Rooming Department.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="2026 Hotel Reservation Guide">
  <meta property="og:title" content="2026 Hotel Reservation Guide">
  <meta property="og:description" content="This guide was prepared by the 2026 Rooming Department.">
  <meta property="og:url" content="https://2026roominginfo.pages.dev/">
  <meta property="og:image" content="https://2026roominginfo.pages.dev/2026roominginfo-logo.jpeg">
  <meta property="og:image:secure_url" content="https://2026roominginfo.pages.dev/2026roominginfo-logo.jpeg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="2048">
  <meta property="og:image:height" content="1152">
  <meta property="og:image:alt" content="Watercolor hotel reservation guide illustration">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="2026 Hotel Reservation Guide">
  <meta name="twitter:description" content="This guide was prepared by the 2026 Rooming Department.">
  <meta name="twitter:image" content="https://2026roominginfo.pages.dev/2026roominginfo-logo.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-cream: #f4f9f5;
      --sky-soft: #dcecfb;
      --sky: #9fc8e8;
      --sky-deep: #477da8;
      --spring-green: #8fb86e;
      --leaf-green: #5f7f4a;
      --navy-primary: #243b53;
      --gold-accent: #8dae62;
      --text-dark: #24313f;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #eaf5ff 0%, #f7fbef 52%, #f4f9f5 100%);
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark);
      line-height: 1.7;
      margin: 0;
      overflow-x: hidden;
    }

    .watercolor-bg {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 15% 12%, rgba(159, 200, 232, 0.28) 0%, transparent 38%),
                  radial-gradient(circle at 85% 20%, rgba(255, 255, 255, 0.7) 0%, transparent 28%),
                  radial-gradient(circle at 92% 82%, rgba(143, 184, 110, 0.22) 0%, transparent 42%),
                  radial-gradient(circle at 8% 78%, rgba(95, 127, 74, 0.12) 0%, transparent 34%);
      z-index: -1;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      padding: 24px 16px 10px;
      animation: fadeInDown 1s ease;
    }

    .convention-logo {
      font-family: 'Merriweather', serif;
      font-size: 1.2rem;
      color: var(--leaf-green);
      letter-spacing: 3px;
      display: block;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Merriweather', serif;
      font-size: 2.5rem;
      color: var(--navy-primary);
      margin: 0;
      line-height: 1.2;
    }

    .helpdesk-subtitle {
      color: var(--sky-deep);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin: 18px 0 12px;
      text-transform: uppercase;
    }

    .reservation-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(159,200,232,0.5);
      color: var(--navy-primary);
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(71,125,168,0.08);
    }

    section {
      background: var(--white);
      border-radius: 18px;
      padding: 35px;
      margin-bottom: 30px;
      box-shadow: 0 14px 34px rgba(71,125,168,0.08);
      border: 1px solid rgba(159,200,232,0.45);
      animation: fadeInUp 0.8s ease forwards;
    }

    h2 {
      font-family: 'Merriweather', serif;
      color: var(--navy-primary);
      border-bottom: 2px solid rgba(159,200,232,0.35);
      padding-bottom: 15px;
      margin-top: 0;
    }

    .data-row {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px dashed #eee;
    }
    
    .data-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .text-content {
      margin-bottom: 15px;
      font-size: 1rem;
    }

    /* 시트에서 불러온 이미지를 위한 스타일 */
    .section-note {
      color: #4a5568;
      margin: -5px 0 25px;
    }

    .step-block {
      background: linear-gradient(180deg, #f8fcff 0%, #f6fbf1 100%);
      border: 1px solid rgba(143,184,110,0.28);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 22px;
    }

    .step-block h3,
    .support-card h3 {
      color: var(--navy-primary);
      margin: 0 0 16px;
      font-size: 1.25rem;
    }

    .step-item {
      padding: 16px 0;
      border-top: 1px dashed rgba(95,127,74,0.25);
    }

    .step-item:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .step-item p {
      margin: 0 0 12px;
    }

    .room-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .room-card {
      border: 1px solid rgba(26,54,93,0.12);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 8px 20px rgba(71,125,168,0.08);
    }

    .room-card .instruction-image {
      border: none;
      border-radius: 0;
      box-shadow: none;
      margin: 0;
      width: 100%;
      height: 190px;
      max-height: 190px;
      background: #f4f9f5;
    }

    .room-card-body {
      padding: 16px;
    }

    .room-card h3 {
      color: var(--navy-primary);
      font-size: 1.05rem;
      margin: 0 0 8px;
    }

    .room-card p {
      margin: 0;
      color: #4a5568;
    }

    .support-card {
      background: linear-gradient(180deg, #f8fcff 0%, #f5fbef 100%);
      border: 1px solid rgba(143,184,110,0.28);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .support-card p {
      margin: 0 0 14px;
    }

    .support-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .sms-link {
      display: block;
      padding: 16px;
      border-radius: 14px;
      background: var(--white);
      color: var(--navy-primary);
      text-decoration: none;
      border: 1px solid rgba(71,125,168,0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .sms-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(26,54,93,0.08);
    }

    .sms-link strong {
      display: block;
      margin-bottom: 5px;
    }

    .highlight-red {
      color: #c53030;
      font-weight: 700;
    }

    .doc-heading {
      display: block;
      margin: 18px 0 10px;
      padding: 10px 14px;
      border-left: 5px solid var(--spring-green);
      border-radius: 10px;
      background: rgba(220,236,251,0.55);
      color: var(--navy-primary);
      font-weight: 700;
      font-size: 1.05rem;
    }

    .doc-subheading {
      display: block;
      margin: 14px 0 8px;
      color: var(--sky-deep);
      font-weight: 700;
    }

    .doc-list {
      margin: 10px 0 14px;
      padding-left: 22px;
    }

    .doc-list li {
      margin: 6px 0;
    }

    .action-chip {
      display: inline-block;
      margin: 0 2px;
      padding: 2px 9px;
      border-radius: 999px;
      background: #e7f3ff;
      border: 1px solid rgba(71,125,168,0.26);
      color: var(--sky-deep);
      font-weight: 700;
      white-space: nowrap;
    }

    .doc-divider {
      height: 1px;
      margin: 18px 0;
      background: linear-gradient(90deg, transparent, rgba(143,184,110,0.48), transparent);
    }

    .instruction-image {
      width: min(100%, 640px);
      max-width: 100%;
      max-height: 360px;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(71,125,168,0.12);
      border: 1px solid rgba(159,200,232,0.45);
      display: block;
      margin: 15px auto;
      pointer-events: none;
      cursor: default;
      user-select: none;
    }

    .step-item .instruction-image {
      max-height: 300px;
    }

    .loading {
      text-align: center;
      font-size: 1.2rem;
      color: var(--gold-accent);
      padding: 50px;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .helpdesk-subtitle {
        font-size: 0.85rem;
        letter-spacing: 0.04em;
      }
      section { padding: 25px; }
      .instruction-image,
      .step-item .instruction-image {
        max-height: 260px;
      }
      .room-grid,
      .support-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="watercolor-bg"></div>

  <div class="container">
    <header>
      <span class="convention-logo">2026 ENGLISH REGIONAL CONVENTION</span>
      <h1>ETERNAL HAPPINESS</h1>
      <p class="helpdesk-subtitle">[Convention Rooming Department]</p>
      <p id="reservation-status" class="reservation-status">May 1, 08:00 AM</p>
    </header>

    <div id="content-area">
      <div class="loading">Loading reservation guide...</div>
    </div>
  </div>

  <script>
    // ★ 여기에 앱스스크립트에서 새로 배포한 '웹앱 URL'을 붙여넣으세요 ★
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw7w5o6ptYwJMAUauX0YskpLQ1rbgV0IYPYjb2PpVpsTqrSqct6q5TgF2TFZH-WpxiN/exec';

    async function loadData() {
      try {
        const response = await fetch(APPS_SCRIPT_URL);
        const data = await response.json();
        renderUI(data);
      } catch (error) {
        document.getElementById('content-area').innerHTML = '<p style="text-align:center; color:red;">Failed to load data. Please check the connection.</p>';
        console.error('Error fetching data:', error);
      }
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatInline(value) {
      return escapeHTML(value)
        .replace(/\[\[(.*?)\]\]/g, '<span class="action-chip">$1</span>')
        .replace(/\*\*(.*?)\*\*/g, '<span class="highlight-red">$1</span>');
    }

    function formatLabel(value) {
      const cleanedValue = String(value || '')
        .replace(/^\s*#{1,3}\s+/, '')
        .replace(/^\s*\*\s+/, '');
      return formatInline(cleanedValue);
    }

    function formatText(value) {
      const lines = String(value || '').split(/\r?\n/);
      const parts = [];
      let listItems = [];

      function flushList() {
        if (!listItems.length) return;
        parts.push(`<ul class="doc-list">${listItems.map((item) => `<li>${formatInline(item)}</li>`).join('')}</ul>`);
        listItems = [];
      }

      lines.forEach((line) => {
        const trimmed = line.trim();

        if (!trimmed) {
          flushList();
          parts.push('<br>');
          return;
        }

        if (trimmed === '***') {
          flushList();
          parts.push('<div class="doc-divider"></div>');
          return;
        }

        if (trimmed.startsWith('## ')) {
          flushList();
          parts.push(`<span class="doc-heading">${formatInline(trimmed.slice(3))}</span>`);
          return;
        }

        if (trimmed.startsWith('### ')) {
          flushList();
          parts.push(`<span class="doc-subheading">${formatInline(trimmed.slice(4))}</span>`);
          return;
        }

        if (trimmed.startsWith('# ')) {
          flushList();
          parts.push(`<span class="doc-subheading">${formatInline(trimmed.slice(2))}</span>`);
          return;
        }

        if (trimmed.startsWith('* ')) {
          listItems.push(trimmed.slice(2));
          return;
        }

        flushList();
        parts.push(`<span>${formatInline(trimmed)}</span>`);
      });

      flushList();
      return parts.join('<br>').replace(/<br><br><br>/g, '<br><br>');
    }

    function makeImage(src, altText) {
      if (!src) return null;
      const img = document.createElement('img');
      img.src = src;
      img.className = 'instruction-image';
      img.alt = altText;
      img.loading = 'lazy';
      return img;
    }

    function groupRowsBySection(data) {
      const sections = [];
      let currentSection = null;

      data.forEach((row) => {
        if (row['Title'] === 'Welcome' || !row['Data 1']) return;

        if (row['Title']) {
          currentSection = { title: row['Title'], rows: [] };
          sections.push(currentSection);
        }

        if (currentSection) currentSection.rows.push(row);
      });

      return sections;
    }

    function createSection(title) {
      const section = document.createElement('section');
      const header = document.createElement('h2');
      header.textContent = title;
      section.appendChild(header);
      return section;
    }

    function renderDefaultSection(sectionData) {
      const section = createSection(sectionData.title);

      sectionData.rows.forEach((row) => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'data-row';

        const textDiv = document.createElement('div');
        textDiv.className = 'text-content';
        textDiv.innerHTML = `<strong>${formatLabel(row['Data 1'])}</strong>`;
        if (row['Data 2']) textDiv.innerHTML += `<br>${formatText(row['Data 2'])}`;
        rowDiv.appendChild(textDiv);

        const img = makeImage(row['Image'], 'Guide instruction');
        if (img) rowDiv.appendChild(img);

        section.appendChild(rowDiv);
      });

      return section;
    }

    function renderReservationSteps(sectionData) {
      const section = createSection(sectionData.title);

      const stepGroups = new Map();
      sectionData.rows.forEach((row) => {
        const stepTitle = row['Data 1'];
        if (!stepGroups.has(stepTitle)) stepGroups.set(stepTitle, []);
        stepGroups.get(stepTitle).push(row);
      });

      stepGroups.forEach((rows, stepTitle) => {
        const block = document.createElement('div');
        block.className = 'step-block';
        block.innerHTML = `<h3>${formatLabel(stepTitle)}</h3>`;

        rows.forEach((row) => {
          const item = document.createElement('div');
          item.className = 'step-item';
          item.innerHTML = `<p>${formatText(row['Data 2'])}</p>`;

          const img = makeImage(row['Image'], `${stepTitle} guide instruction`);
          if (img) item.appendChild(img);

          block.appendChild(item);
        });

        section.appendChild(block);
      });

      return section;
    }

    function renderRoomInformation(sectionData) {
      const section = createSection(sectionData.title);
      const note = document.createElement('p');
      note.className = 'section-note';
      note.textContent = 'Compare the available hotel room types at a glance before choosing your room.';
      section.appendChild(note);

      const grid = document.createElement('div');
      grid.className = 'room-grid';

      sectionData.rows.forEach((row) => {
        const card = document.createElement('div');
        card.className = 'room-card';

        const img = makeImage(row['Image'], `${row['Data 1']} room type`);
        if (img) card.appendChild(img);

        const body = document.createElement('div');
        body.className = 'room-card-body';
        body.innerHTML = `<h3>${formatLabel(row['Data 1'])}</h3><p>${formatText(row['Data 2'])}</p>`;
        card.appendChild(body);

        grid.appendChild(card);
      });

      section.appendChild(grid);
      return section;
    }

    function renderSupport(sectionData) {
      const section = createSection(sectionData.title);
      const card = document.createElement('div');
      card.className = 'support-card';
      card.innerHTML = `
        <h3>Need help with your hotel reservation?</h3>
        <p>If you have any questions about accommodations, please send us a text message. We will do our best to reply <span class="highlight-red">within 24 hours</span> whenever possible.</p>
        <p>For general hotel and accommodation questions, contact Jung Hyun Myoung. For technical issues during the reservation process, contact Lee Moonkyung.</p>
        <div class="support-actions">
          <a class="sms-link" href="sms:01035896061">
            <strong>💬 Text Jung Hyun Myoung</strong>
            Accommodation questions<br>010-3589-6061
          </a>
          <a class="sms-link" href="sms:01055241935">
            <strong>💬 Text Lee Moonkyung</strong>
            Reservation process errors<br>010-5524-1935
          </a>
        </div>
      `;

      section.appendChild(card);
      return section;
    }

    function isSectionTitle(sectionData, titles) {
      const normalizedTitle = String(sectionData.title || '').trim();
      return titles.includes(normalizedTitle);
    }

    function getReservationStatus(today = new Date()) {
      const year = 2026;
      const startDate = new Date(year, 4, 1);
      const deadline = new Date(year, 4, 31);
      const current = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const oneDay = 24 * 60 * 60 * 1000;

      if (current < startDate) {
        const daysUntilStart = Math.ceil((startDate - current) / oneDay);
        const status = daysUntilStart === 1 ? 'TOMORROW' : `D-${daysUntilStart}`;
        return {
          label: 'May 1, 08:00 AM',
          status
        };
      }

      if (current.getTime() === startDate.getTime()) {
        return {
          label: 'May 1, 08:00 AM',
          status: 'TODAY'
        };
      }

      if (current <= deadline) {
        const daysUntilDeadline = Math.ceil((deadline - current) / oneDay);
        return {
          label: 'Reservation Deadline: May 31',
          status: daysUntilDeadline === 0 ? 'TODAY' : `D-${daysUntilDeadline}`
        };
      }

      return {
        label: 'Reservation Deadline',
        status: 'HAS PASSED'
      };
    }

    function updateReservationStatus(today = new Date()) {
      const statusElement = document.getElementById('reservation-status');
      if (!statusElement) return;

      const reservationStatus = getReservationStatus(today);
      statusElement.innerHTML = `${reservationStatus.label} - <span class="highlight-red">${reservationStatus.status}</span>`;
    }

    function renderStructuredUI(data, contentArea) {
      contentArea.innerHTML = '';

      groupRowsBySection(data).forEach((sectionData) => {
        if (isSectionTitle(sectionData, ['2. Reservation Steps', 'Booking Process'])) {
          contentArea.appendChild(renderReservationSteps(sectionData));
        } else if (isSectionTitle(sectionData, ['3. Important Room Information', 'Room Details', 'Hotel Room Details'])) {
          contentArea.appendChild(renderRoomInformation(sectionData));
        } else if (isSectionTitle(sectionData, ['6. Support', 'Need Help', 'Need Help & Support'])) {
          contentArea.appendChild(renderSupport(sectionData));
        } else {
          contentArea.appendChild(renderDefaultSection(sectionData));
        }
      });
    }

    function renderUI(data) {
      const contentArea = document.getElementById('content-area');
      renderStructuredUI(data, contentArea);
    }

    function initializePage() {
      updateReservationStatus();
      loadData();
    }

    // 페이지가 로드되면 데이터 가져오기 시작
    window.addEventListener('DOMContentLoaded', initializePage);
  </script>
</body>
</html>
